# ruff.toml

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Added "B" (Bugbear), "UP" (PyUpgrade), and "W" (warnings) for stricter checks
select = ["E", "F", "I", "B", "UP", "W"]
ignore = [
  "D100", # Missing docstring in public module (optional)
  "D104", # Missing docstring in public package (optional)
  "D107", # Missing docstring in __init__ (optional)
  "ANN101", # Missing type annotation for self (optional)
  "ANN102", # Missing type annotation for cls (optional)
  # Removed E501 so line-length is enforced
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true
docstring-code-line-length = 100

[tool.ruff.lint.isort]
known-first-party = ["group_budget_tool"]
combine-as-imports = true
force-single-line = false
lines-between-types = 1

